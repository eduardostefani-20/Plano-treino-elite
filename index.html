// Componente de Exercício Individual
function ExerciseItem({ ex, dayColor, isSpecialSet }) {
  const [completed, setCompleted] = useState(false);
  const [weight, setWeight] = useState("");
  const [repsDone, setRepsDone] = useState("");

  // Carregar dados do localStorage ao montar
  useEffect(() => {
    const savedData = localStorage.getItem(`ex-${ex.id}`);
    if (savedData) {
      const { completed, weight, repsDone } = JSON.parse(savedData);
      setCompleted(completed || false);
      setWeight(weight || "");
      setRepsDone(repsDone || "");
    }
  }, [ex.id]);

  // Salvar dados no localStorage sempre que houver mudança
  const saveData = (updates) => {
    const currentData = { completed, weight, repsDone, ...updates };
    localStorage.setItem(`ex-${ex.id}`, JSON.stringify(currentData));
  };

  const toggleCompleted = () => {
    const newVal = !completed;
    setCompleted(newVal);
    saveData({ completed: newVal });
  };

  const handleWeightChange = (e) => {
    const newVal = e.target.value;
    setWeight(newVal);
    saveData({ weight: newVal });
  };

  const handleRepsChange = (e) => {
    const newVal = e.target.value;
    setRepsDone(newVal);
    saveData({ repsDone: newVal });
  };

  // Lógica para renderizar o vídeo se houver URL no objeto (exemplo: ex.videoUrl)
  const renderVideo = () => {
    if (!ex.videoUrl) return null;
    
    // Suporte para YouTube embed
    if (ex.videoUrl.includes("youtube.com") || ex.videoUrl.includes("youtu.be")) {
      const videoId = ex.videoUrl.split('v=')[1] || ex.videoUrl.split('/').pop();
      return (
        <div className="video-container">
          <iframe src={`https://www.youtube.com/embed/${videoId}`} allowFullScreen title={ex.name}></iframe>
        </div>
      );
    }
    
    // Suporte para vídeo direto (upload)
    return (
      <div className="video-container">
        <video controls src={ex.videoUrl}></video>
      </div>
    );
  };

  return (
    <div style={{ 
      padding: "13px 16px", 
      borderBottom: "1px solid #16161E",
      opacity: completed ? 0.6 : 1,
      transition: "opacity 0.3s ease",
      background: completed ? "rgba(255,255,255,0.02)" : "transparent"
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 7 }}>
        <div style={{ display: "flex", gap: 10, flex: 1, alignItems: "flex-start" }}>
          {/* Checkbox customizado */}
          <div 
            onClick={toggleCompleted}
            style={{ 
              width: 18, 
              height: 18, 
              border: `1px solid ${completed ? dayColor : "#333"}`, 
              borderRadius: 4, 
              display: "flex", 
              alignItems: "center", 
              justifyContent: "center", 
              cursor: "pointer",
              background: completed ? dayColor : "transparent",
              marginTop: 1,
              flexShrink: 0
            }}
          >
            {completed && <span style={{ color: "#fff", fontSize: 12 }}>✓</span>}
          </div>
          <div style={{ fontSize: 13, fontWeight: 700, color: completed ? "#666" : "#DDD", paddingRight: 8 }}>{ex.name}</div>
        </div>
        <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
          {!isSpecialSet(ex.sets) && ex.reps !== "—" && (
            <>
              <span style={{ background: `${dayColor}22`, border: `1px solid ${dayColor}40`, borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 700, color: dayColor }}>{ex.sets}×</span>
              <span style={{ background: "#1E1E2A", borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 700, color: "#777" }}>{ex.reps}</span>
            </>
          )}
          {(isSpecialSet(ex.sets) || ex.reps === "—") && (
            <span style={{ background: `${dayColor}22`, border: `1px solid ${dayColor}40`, borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 700, color: dayColor }}>
              {ex.reps !== "—" ? `${ex.sets} · ${ex.reps}` : ex.sets}
            </span>
          )}
        </div>
      </div>
      
      <div style={{ display: "flex", gap: 7, alignItems: "flex-start", flexWrap: "wrap" }}>
        {ex.rest !== "—" && ex.rest !== "Sem pausa" && (
          <span style={{ background: "#16161E", borderRadius: 4, padding: "1px 6px", fontSize: 9, fontWeight: 700, color: "#3A3A55", letterSpacing: 1, flexShrink: 0 }}>⏱ {ex.rest}</span>
        )}
        {ex.rest === "Sem pausa" && (
          <span style={{ background: "#E8523A18", borderRadius: 4, padding: "1px 6px", fontSize: 9, fontWeight: 700, color: "#E8523A", letterSpacing: 1, flexShrink: 0 }}>🔥 SEM PAUSA</span>
        )}
        <span style={{ fontSize: 11, color: "#4A4A60", lineHeight: 1.4, flex: "1 1 100%", marginBottom: 8 }}>{ex.note}</span>
        
        {/* Campos Interativos: Peso e Repetições */}
        <div style={{ display: "flex", gap: 10, width: "100%", marginTop: 4 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ fontSize: 9, color: "#444", fontWeight: 700, textTransform: "uppercase" }}>Peso:</span>
            <input 
              type="text" 
              className="exercise-input" 
              placeholder="kg" 
              value={weight}
              onChange={handleWeightChange}
            />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ fontSize: 9, color: "#444", fontWeight: 700, textTransform: "uppercase" }}>Reps:</span>
            <input 
              type="number" 
              className="exercise-input" 
              placeholder="0" 
              value={repsDone}
              onChange={handleRepsChange}
            />
          </div>
        </div>
      </div>
      
      {/* Área de Vídeo */}
      {renderVideo()}
    </div>
  );
}

          {plan.days.map((d, i) => (
            <button key={d.id} onClick={() => { setActiveDay(i); setExpandedSection(null); }} style={{
              flex: "0 0 auto",
              background: activeDay === i ? d.color : "#16161E",
              border: activeDay === i ? "none" : "1px solid #22222E",
              borderRadius: 10, padding: "10px 18px", transition: "all 0.15s",
            }}>
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: activeDay === i ? "#fff" : "#444", textTransform: "uppercase" }}>{d.label}</div>
            </button>
          ))}
          <button style={{ flex: "0 0 auto", background: "#16161E", border: "1px solid #1A1A22", borderRadius: 10, padding: "10px 18px", cursor: "default" }}>
            <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1.5, color: "#2A2A38", textTransform: "uppercase" }}>SAB</div>
          </button>
        </div>

        {/* Day Header Card */}
        <div style={{ margin: "16px 20px 12px", borderRadius: 14, background: `linear-gradient(135deg, ${day.color}20 0%, #12121A 100%)`, border: `1px solid ${day.color}30`, padding: "18px 20px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontSize: 9, color: day.color, fontWeight: 800, letterSpacing: 3, textTransform: "uppercase", marginBottom: 4 }}>{day.fullLabel} · {day.tag}</div>
              <div style={{ fontSize: 18, fontWeight: 900, letterSpacing: -0.5, color: "#F0F0F0" }}>{day.title}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 9, color: "#444", letterSpacing: 1, textTransform: "uppercase" }}>Duração</div>
              <div style={{ fontSize: 15, fontWeight: 800, color: day.color }}>{day.duration}</div>
            </div>
          </div>
        </div>

        {/* Sections */}
        <div style={{ padding: "0 20px 80px" }}>
          {day.sections.map((section, si) => (
            <div key={si} style={{ marginBottom: 10 }}>
              <button onClick={() => setExpandedSection(expandedSection === si ? null : si)} style={{
                width: "100%", background: expandedSection === si ? "#1A1A24" : "#14141C",
                border: "1px solid #1E1E2A",
                borderRadius: expandedSection === si ? "10px 10px 0 0" : 10,
                padding: "13px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", transition: "all 0.15s",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                  <span style={{ fontSize: 15 }}>{section.icon}</span>
                  <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: 2, color: "#CCC", textTransform: "uppercase" }}>{section.name}</span>
                  <span style={{ background: "#1E1E2A", borderRadius: 4, padding: "2px 7px", fontSize: 10, color: "#444", fontWeight: 600 }}>{section.exercises.length}</span>
                </div>
                <span style={{ color: "#333", fontSize: 12, display: "inline-block", transform: expandedSection === si ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
              </button>

              {expandedSection === si && (
                <div style={{ background: "#11111A", border: "1px solid #1E1E2A", borderTop: "none", borderRadius: "0 0 10px 10px", overflow: "hidden" }}>
                  {section.exercises.map((ex, ei) => (
                    <ExerciseItem 
                      key={ex.id || ei} 
                      ex={ex} 
                      dayColor={day.color} 
                      isSpecialSet={isSpecialSet} 
                    />
                  ))}
                </div>
              )}
            </div>
          ))}
          {expandedSection === null && (
            <div style={{ textAlign: "center", padding: "20px 0", color: "#2A2A38", fontSize: 11, letterSpacing: 1 }}>Toque em uma seção para ver os exercícios ↑</div>
          )}
        </div>
      </>}

      {/* ===== TAB: PROGRESSÃO ===== */}
      {activeTab === "progressão" && (
        <div style={{ padding: "20px 20px 80px" }}>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 9, letterSpacing: 3, color: "#444", fontWeight: 700, marginBottom: 5, textTransform: "uppercase" }}>PERIODIZAÇÃO SIMPLES</div>
            <div style={{ fontSize: 18, fontWeight: 900, color: "#F0F0F0", letterSpacing: -0.5 }}>Progressão 30 Dias</div>
          </div>

          {plan.weekProgression.map((w, i) => (
            <div key={i} style={{ background: "#14141C", border: "1px solid #1E1E2A", borderLeft: `3px solid ${w.cor}`, borderRadius: 12, padding: "16px 18px", marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: 2, color: w.cor, textTransform: "uppercase" }}>{w.week}</span>
                <span style={{ background: "#1A1A22", borderRadius: 4, padding: "2px 8px", fontSize: 10, color: "#444" }}>{w.dias}</span>
              </div>
              <div style={{ fontSize: 14, fontWeight: 800, color: "#E0E0E0", marginBottom: 5 }}>{w.focus}</div>
              <div style={{ fontSize: 12, color: "#4A4A60", lineHeight: 1.5 }}>{w.detail}</div>
            </div>
          ))}

          <div style={{ background: "#14141C", border: "1px solid #E8523A30", borderRadius: 12, padding: "16px 18px", marginTop: 4 }}>
            <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: 2, color: "#E8523A", marginBottom: 12, textTransform: "uppercase" }}>⚡ Técnicas Avançadas (1× / semana)</div>
            {[
              ["Drop Set", "Última série: reduz 30% da carga sem pausa"],
              ["Rest-Pause", "8 reps → 15s de pausa → mais 3–4 reps"],
              ["Bi-Set", "2 exercícios seguidos sem descanso entre eles"],
            ].map(([t, d], i) => (
              <div key={i} style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "flex-start" }}>
                <span style={{ color: "#E8523A", fontSize: 11, marginTop: 1, flexShrink: 0 }}>▸</span>
                <div>
                  <span style={{ fontSize: 12, fontWeight: 700, color: "#BBB" }}>{t}</span>
                  <span style={{ fontSize: 12, color: "#4A4A60" }}> — {d}</span>
                </div>
              </div>
            ))}
            <div style={{ fontSize: 11, color: "#2E2E42", marginTop: 8, borderTop: "1px solid #1A1A22", paddingTop: 8 }}>Não abuse — recuperação é prioridade</div>
          </div>
        </div>
      )}

      {/* ===== TAB: NUTRIÇÃO ===== */}
      {activeTab === "nutrição" && (
        <div style={{ padding: "20px 20px 80px" }}>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 9, letterSpacing: 3, color: "#444", fontWeight: 700, marginBottom: 5, textTransform: "uppercase" }}>SUPORTE NUTRICIONAL</div>
            <div style={{ fontSize: 18, fontWeight: 900, color: "#F0F0F0", letterSpacing: -0.5 }}>Estratégia Alimentar</div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
            {plan.nutrition.map((n, i) => (
              <div key={i} style={{ background: "#14141C", border: "1px solid #1E1E2A", borderRadius: 12, padding: "15px 14px", gridColumn: i === 4 ? "1 / -1" : undefined }}>
                <div style={{ fontSize: 20, marginBottom: 7 }}>{n.icon}</div>
                <div style={{ fontSize: 9, color: "#444", letterSpacing: 1.5, fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>{n.label}</div>
                <div style={{ fontSize: 14, fontWeight: 800, color: "#E0E0E0", marginBottom: 3 }}>{n.value}</div>
                <div style={{ fontSize: 11, color: "#3A3A55", lineHeight: 1.4 }}>{n.detail}</div>
              </div>
            ))}
          </div>

          <div style={{ background: "linear-gradient(135deg, #E8523A18 0%, #14141C 100%)", border: "1px solid #E8523A30", borderRadius: 12, padding: "16px 18px" }}>
            <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: 2, color: "#E8523A", marginBottom: 10, textTransform: "uppercase" }}>🎯 Resultado Esperado — 30 Dias</div>
            {[
              "Redução perceptível de gordura corporal",
              "Aumento de densidade e dureza muscular",
              "Melhora visual do shape e proporções",
              "Maior vascularização e definição",
              "Ganho expressivo de condicionamento físico",
              "Manutenção ou ganho de massa magra",
            ].map((r, i) => (
              <div key={i} style={{ display: "flex", gap: 9, marginBottom: 8, alignItems: "center" }}>
                <span style={{ color: "#E8523A", fontSize: 10, flexShrink: 0 }}>✦</span>
                <span style={{ fontSize: 12, color: "#5A5A75" }}>{r}</span>
              </div>
            ))}
          </div>
        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
