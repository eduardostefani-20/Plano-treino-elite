<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPlanner — Elite Training System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: #0A0A0C;
      color: #F0F0F0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0A0A0C; }
    ::-webkit-scrollbar-thumb { background: #2A2A38; border-radius: 2px; }
    button { cursor: pointer; border: none; background: none; }
    input, textarea { outline: none; font-family: inherit; }

    /* ===== WORKOUT STYLES (original — not changed) ===== */
    .exercise-input {
      background: #16161E;
      border: 1px solid #1E1E2A;
      border-radius: 4px;
      color: #DDD;
      font-size: 10px;
      padding: 2px 6px;
      width: 50px;
      outline: none;
      transition: border-color 0.2s;
    }
    .exercise-input:focus { border-color: #E8523A; }
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 8px;
      margin-top: 10px;
      background: #000;
    }
    .video-container iframe, .video-container video {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
    }

    /* ===== LAYOUT ===== */
    #root { display: flex; height: 100vh; overflow: hidden; }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #0D0D10;
      border-right: 1px solid #1A1A22;
      display: flex;
      flex-direction: column;
      padding: 0;
      z-index: 200;
      transition: transform 0.3s ease;
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid #1A1A22;
    }
    .sidebar-logo-tag {
      font-size: 8px;
      letter-spacing: 4px;
      color: #333;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sidebar-logo-name {
      font-family: 'Bebas Neue', 'Helvetica Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: #F0F0F0;
      line-height: 1;
    }
    .sidebar-logo-name span { color: #E8523A; }
    .sidebar-nav {
      flex: 1;
      padding: 16px 10px;
      overflow-y: auto;
    }
    .nav-section-label {
      font-size: 8px;
      letter-spacing: 3px;
      color: #2A2A38;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0 10px;
      margin: 12px 0 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #3A3A55;
      text-transform: uppercase;
      transition: all 0.15s;
      width: 100%;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: #14141C; color: #888; }
    .nav-item.active { background: #16161E; color: #F0F0F0; }
    .nav-item.active .nav-dot { background: #E8523A; }
    .nav-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2A2A38;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-footer {
      border-top: 1px solid #1A1A22;
      padding: 14px 16px;
    }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8523A, #C44FD8);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .user-name { font-size: 12px; font-weight: 700; color: #888; }
    .user-plan { font-size: 9px; color: #333; letter-spacing: 1px; text-transform: uppercase; }

    .main-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: #0A0A0C;
    }

    /* ===== MOBILE BOTTOM NAV ===== */
    .mobile-topbar {
      display: none;
      background: #0D0D10;
      border-bottom: 1px solid #1A1A22;
      padding: 14px 20px;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 300;
    }
    .mobile-logo {
      font-family: 'Bebas Neue', 'Helvetica Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: #F0F0F0;
    }
    .mobile-logo span { color: #E8523A; }
    .mobile-bottomnav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0D0D10;
      border-top: 1px solid #1A1A22;
      padding: 8px 0 12px;
      z-index: 300;
      justify-content: space-around;
    }
    .mobile-nav-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 4px 12px;
      font-size: 8px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: #333;
      transition: color 0.15s;
      cursor: pointer;
    }
    .mobile-nav-btn.active { color: #E8523A; }
    .mobile-nav-icon { font-size: 18px; }

    @media (max-width: 768px) {
      body { overflow: auto; }
      #root { flex-direction: column; overflow: visible; height: auto; min-height: 100vh; }
      .sidebar { display: none; }
      .mobile-topbar { display: flex; }
      .mobile-bottomnav { display: flex; }
      .main-area { overflow: visible; padding-bottom: 70px; }
    }

    /* ===== PAGE SECTIONS ===== */
    .page { min-height: 100vh; }

    /* Dashboard */
    .dash-header {
      background: #0D0D10;
      border-bottom: 1px solid #1A1A22;
      padding: 28px 28px 20px;
    }
    .dash-header-tag { font-size: 9px; letter-spacing: 4px; color: #333; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
    .dash-header-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: #F0F0F0; line-height: 1; }
    .dash-header-sub { font-size: 12px; color: #444; margin-top: 5px; }
    .dash-body { padding: 24px 28px 80px; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .metric-card {
      background: #14141C;
      border: 1px solid #1E1E2A;
      border-radius: 14px;
      padding: 18px 16px;
      transition: border-color 0.2s;
    }
    .metric-card:hover { border-color: #2A2A38; }
    .metric-icon { font-size: 22px; margin-bottom: 10px; }
    .metric-label { font-size: 9px; letter-spacing: 2px; color: #444; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .metric-value { font-size: 22px; font-weight: 900; color: #F0F0F0; letter-spacing: -1px; }
    .metric-sub { font-size: 10px; color: #3A3A55; margin-top: 3px; }
    .metric-bar { height: 3px; background: #1A1A22; border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .metric-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

    .dash-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .dash-card {
      background: #14141C;
      border: 1px solid #1E1E2A;
      border-radius: 14px;
      padding: 20px;
    }
    .dash-card-title { font-size: 9px; letter-spacing: 3px; color: #444; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; }
    .dash-card-big { font-size: 28px; font-weight: 900; color: #F0F0F0; letter-spacing: -1px; }

    .week-strip {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .week-day {
      flex: 1; background: #14141C; border: 1px solid #1E1E2A;
      border-radius: 10px; padding: 10px 6px; text-align: center;
    }
    .week-day.done { border-color: #2EAF6B44; background: #2EAF6B11; }
    .week-day.today { border-color: #E8523A; }
    .week-day-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: #444; text-transform: uppercase; }
    .week-day.today .week-day-label { color: #E8523A; }
    .week-day-dot { width: 6px; height: 6px; border-radius: 50%; background: #1E1E2A; margin: 6px auto 0; }
    .week-day.done .week-day-dot { background: #2EAF6B; }
    .week-day.today .week-day-dot { background: #E8523A; }

    /* Water tracker */
    .water-cups { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .water-cup {
      width: 32px; height: 38px;
      background: #16161E;
      border: 1px solid #1E1E2A;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer;
      transition: all 0.15s;
    }
    .water-cup.filled { background: #1A3A55; border-color: #3A7BE8; }

    /* Progress rings */
    .rings-row { display: flex; gap: 16px; align-items: center; }
    .ring-wrap { text-align: center; }
    .ring-label { font-size: 9px; color: #444; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; }

    /* Stat rows */
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #16161E; }
    .stat-row:last-child { border-bottom: none; }
    .stat-row-label { font-size: 12px; color: #555; }
    .stat-row-val { font-size: 13px; font-weight: 800; color: #CCC; }

    /* Goals */
    .goal-item { display: flex; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #16161E; }
    .goal-item:last-child { border-bottom: none; }
    .goal-check { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #2A2A38; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
    .goal-check.done { background: #E8523A22; border-color: #E8523A; color: #E8523A; }
    .goal-text { font-size: 12px; color: #666; }
    .goal-text.done { color: #888; text-decoration: line-through; }

    /* Dieta */
    .meal-card { background: #14141C; border: 1px solid #1E1E2A; border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
    .meal-header { padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; }
    .meal-title { font-size: 13px; font-weight: 800; color: #DDD; }
    .meal-time { font-size: 10px; color: #444; font-weight: 700; letter-spacing: 1px; }
    .meal-kcal { font-size: 11px; font-weight: 800; color: #E8523A; }
    .meal-body { padding: 0 18px 14px; }
    .meal-item { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #16161E; }
    .meal-item:last-child { border-bottom: none; }
    .meal-item-name { font-size: 12px; color: #666; }
    .meal-item-macro { font-size: 11px; color: #444; }
    .macro-bar { display: flex; gap: 8px; padding: 14px 18px; border-top: 1px solid #16161E; }
    .macro-pill { flex: 1; background: #16161E; border-radius: 6px; padding: 8px 10px; text-align: center; }
    .macro-pill-label { font-size: 8px; letter-spacing: 1.5px; color: #444; font-weight: 700; text-transform: uppercase; }
    .macro-pill-val { font-size: 13px; font-weight: 900; color: #DDD; margin-top: 2px; }

    /* Progresso */
    .progress-header { background: #0D0D10; border-bottom: 1px solid #1A1A22; padding: 28px 28px 20px; }
    .prog-chart-area { background: #14141C; border: 1px solid #1E1E2A; border-radius: 14px; padding: 20px; margin-bottom: 12px; }
    .prog-chart-title { font-size: 9px; letter-spacing: 3px; color: #444; font-weight: 700; text-transform: uppercase; margin-bottom: 16px; }
    .prog-photos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .prog-photo-card { background: #14141C; border: 1px solid #1E1E2A; border-radius: 12px; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; cursor: pointer; transition: border-color 0.2s; }
    .prog-photo-card:hover { border-color: #E8523A44; }

    /* Perfil */
    .perfil-avatar-big {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8523A, #C44FD8);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900; color: #fff;
      margin: 0 auto 14px;
    }
    .perfil-card { background: #14141C; border: 1px solid #1E1E2A; border-radius: 14px; padding: 20px; margin-bottom: 10px; }

    /* Badge elite */
    .elite-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #E8523A; border-radius: 6px;
      padding: 4px 10px; font-size: 9px; font-weight: 800;
      letter-spacing: 2px; color: #fff; text-transform: uppercase;
    }

    @media (max-width: 1100px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .dash-header { padding: 20px 16px 16px; }
      .dash-body { padding: 16px 16px 20px; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .dash-grid-2 { grid-template-columns: 1fr; }
      .dash-header-title { font-size: 28px; }
      .week-strip { gap: 5px; }
    }
  </style>
</head>

function ExerciseItem({ ex, dayColor, isSpecialSet }) {
  const [completed, setCompleted] = useState(false);
  const [weight, setWeight] = useState("");
  const [repsDone, setRepsDone] = useState("");

  useEffect(() => {
    try {
      const savedData = localStorage.getItem(`ex-${ex.id}`);
      if (savedData) {
        const { completed, weight, repsDone } = JSON.parse(savedData);
        setCompleted(completed || false);
        setWeight(weight || "");
        setRepsDone(repsDone || "");
      }
    } catch(e){}
  }, [ex.id]);

  const saveData = (updates) => {
    try {
      const currentData = { completed, weight, repsDone, ...updates };
      localStorage.setItem(`ex-${ex.id}`, JSON.stringify(currentData));
    } catch(e){}
  };

  const toggleCompleted = () => {
    const newVal = !completed;
    setCompleted(newVal);
    saveData({ completed: newVal });
  };
  const handleWeightChange = (e) => { const v = e.target.value; setWeight(v); saveData({ weight: v }); };
  const handleRepsChange = (e) => { const v = e.target.value; setRepsDone(v); saveData({ repsDone: v }); };

  const renderVideo = () => {
    if (!ex.videoUrl) return null;
    if (ex.videoUrl.includes("youtube.com") || ex.videoUrl.includes("youtu.be")) {
      const videoId = ex.videoUrl.split('v=')[1] || ex.videoUrl.split('/').pop();
      return <div className="video-container"><iframe src={`https://www.youtube.com/embed/${videoId}`} allowFullScreen title={ex.name}></iframe></div>;
    }
    return <div className="video-container"><video controls src={ex.videoUrl}></video></div>;
  };

  return (
    <div style={{ padding:"13px 16px", borderBottom:"1px solid #16161E", opacity: completed ? 0.6 : 1, transition:"opacity 0.3s ease", background: completed ? "rgba(255,255,255,0.02)" : "transparent" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:7 }}>
        <div style={{ display:"flex", gap:10, flex:1, alignItems:"flex-start" }}>
          <div onClick={toggleCompleted} style={{ width:18, height:18, border:`1px solid ${completed ? dayColor : "#333"}`, borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", background: completed ? dayColor : "transparent", marginTop:1, flexShrink:0 }}>
            {completed && <span style={{ color:"#fff", fontSize:12 }}>✓</span>}
          </div>
          <div style={{ fontSize:13, fontWeight:700, color: completed ? "#666" : "#DDD", paddingRight:8 }}>{ex.name}</div>
        </div>
        <div style={{ display:"flex", gap:5, flexShrink:0 }}>
          {!isSpecialSet(ex.sets) && ex.reps !== "—" && (
            <>
              <span style={{ background:`${dayColor}22`, border:`1px solid ${dayColor}40`, borderRadius:5, padding:"2px 7px", fontSize:10, fontWeight:700, color:dayColor }}>{ex.sets}×</span>
              <span style={{ background:"#1E1E2A", borderRadius:5, padding:"2px 7px", fontSize:10, fontWeight:700, color:"#777" }}>{ex.reps}</span>
            </>
          )}
          {(isSpecialSet(ex.sets) || ex.reps === "—") && (
            <span style={{ background:`${dayColor}22`, border:`1px solid ${dayColor}40`, borderRadius:5, padding:"2px 7px", fontSize:10, fontWeight:700, color:dayColor }}>
              {ex.reps !== "—" ? `${ex.sets} · ${ex.reps}` : ex.sets}
            </span>
          )}
        </div>
      </div>
      <div style={{ display:"flex", gap:7, alignItems:"flex-start", flexWrap:"wrap" }}>
        {ex.rest !== "—" && ex.rest !== "Sem pausa" && (
          <span style={{ background:"#16161E", borderRadius:4, padding:"1px 6px", fontSize:9, fontWeight:700, color:"#3A3A55", letterSpacing:1, flexShrink:0 }}>⏱ {ex.rest}</span>
        )}
        {ex.rest === "Sem pausa" && (
          <span style={{ background:"#E8523A18", borderRadius:4, padding:"1px 6px", fontSize:9, fontWeight:700, color:"#E8523A", letterSpacing:1, flexShrink:0 }}>🔥 SEM PAUSA</span>
        )}
        <span style={{ fontSize:11, color:"#4A4A60", lineHeight:1.4, flex:"1 1 100%", marginBottom:8 }}>{ex.note}</span>
        <div style={{ display:"flex", gap:10, width:"100%", marginTop:4 }}>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}>
            <span style={{ fontSize:9, color:"#444", fontWeight:700, textTransform:"uppercase" }}>Peso:</span>
            <input type="text" className="exercise-input" placeholder="kg" value={weight} onChange={handleWeightChange} />
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}>
            <span style={{ fontSize:9, color:"#444", fontWeight:700, textTransform:"uppercase" }}>Reps:</span>
            <input type="number" className="exercise-input" placeholder="0" value={repsDone} onChange={handleRepsChange} />
          </div>
        </div>
      </div>
      {renderVideo()}
    </div>
  );
}

function ProgressRing({ value, max, color, size=64 }) {
  const r = (size/2) - 6;
  const circ = 2 * Math.PI * r;
  const fill = circ - (value / max) * circ;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1E1E2A" strokeWidth="5"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="5"
        strokeDasharray={circ} strokeDashoffset={fill}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition:"stroke-dashoffset 1s ease" }}/>
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle" fill="#F0F0F0" fontSize="11" fontWeight="900">
        {value}%
      </text>
    </svg>
  );
}

/* ============================================================
   PROGRESSO
   ============================================================ */
function ProgressoPage() {
  const weeks = ["S1","S2","S3","S4"];
  const weights = [85.2, 84.1, 83.5, 82.8];
  const bf = [18.5, 17.8, 17.0, 16.2];

  const maxW = Math.max(...weights);
  const minW = Math.min(...weights);
  const chartH = 100;
  const chartW = 260;
  const pts = weights.map((w,i) => {
    const x = (i/(weights.length-1)) * chartW;
    const y = chartH - ((w - minW + 0.5)/(maxW - minW + 1)) * (chartH - 10);
    return `${x},${y}`;
  }).join(" ");

  return (
    <div>
      <div className="dash-header">
        <div className="dash-header-tag">Evolução física</div>
        <div className="dash-header-title">Progresso</div>
        <div className="dash-header-sub">Acompanhe sua transformação ao longo dos 30 dias</div>
      </div>
      <div className="dash-body">

        {/* Chart peso */}
        <div className="prog-chart-area">
          <div className="prog-chart-title">📉 Evolução de peso (kg)</div>
          <svg width="100%" viewBox={`0 0 ${chartW} ${chartH+20}`} preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#E8523A" stopOpacity="0.3"/>
                <stop offset="100%" stopColor="#E8523A" stopOpacity="0"/>
              </linearGradient>
            </defs>
            <polyline points={pts} fill="none" stroke="#E8523A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            {weights.map((w,i) => {
              const x = (i/(weights.length-1)) * chartW;
              const y = chartH - ((w - minW + 0.5)/(maxW - minW + 1)) * (chartH - 10);
              return (
                <g key={i}>
                  <circle cx={x} cy={y} r="4" fill="#E8523A"/>
                  <text x={x} y={y-8} textAnchor="middle" fill="#888" fontSize="9">{w}</text>
                  <text x={x} y={chartH+14} textAnchor="middle" fill="#444" fontSize="9">{weeks[i]}</text>
                </g>
              );
            })}
          </svg>
        </div>

        {/* Stats evolução */}
        <div className="dash-grid-2">
          <div className="dash-card">
            <div className="dash-card-title">⚖️ Peso</div>
            <div className="dash-card-big">-2.4 <span style={{ fontSize:14, color:"#2EAF6B" }}>kg</span></div>
            <div style={{ fontSize:11, color:"#3A3A55", marginTop:4 }}>85.2 → 82.8 kg em 30 dias</div>
          </div>
          <div className="dash-card">
            <div className="dash-card-title">📉 Gordura Corporal</div>
            <div className="dash-card-big">-2.3 <span style={{ fontSize:14, color:"#2EAF6B" }}>%</span></div>
            <div style={{ fontSize:11, color:"#3A3A55", marginTop:4 }}>18.5 → 16.2% em 30 dias</div>
          </div>
        </div>

        {/* % Gordura chart */}
        <div className="prog-chart-area" style={{ marginTop:12 }}>
          <div className="prog-chart-title">📊 % Gordura Corporal</div>
          <div style={{ display:"flex", gap:6, alignItems:"flex-end", height:60 }}>
            {bf.map((v,i) => (
              <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                <div style={{ fontSize:9, color:"#888" }}>{v}%</div>
                <div style={{ width:"100%", background:`#3A7BE8${Math.round((1-(i/3))*100).toString(16).padStart(2,"0")}`, height: v*2 + "px", borderRadius:"4px 4px 0 0", minHeight:10, transition:"height 0.8s ease" }}/>
                <div style={{ fontSize:9, color:"#444" }}>{weeks[i]}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Fotos */}
        <div style={{ marginTop:12 }}>
          <div style={{ fontSize:9, letterSpacing:3, color:"#444", fontWeight:700, marginBottom:10, textTransform:"uppercase" }}>📸 Fotos de Progresso</div>
          <div className="prog-photos">
            {["Início","Semana 2","Semana 3","Hoje"].map((label,i) => (
              <div className="prog-photo-card" key={i}>
                <span style={{ fontSize:28 }}>📷</span>
                <div style={{ fontSize:10, color:"#333", fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>{label}</div>
                <div style={{ fontSize:9, color:"#2A2A38" }}>Toque para adicionar</div>
              </div>
            ))}
          </div>
        </div>

        {/* Medidas */}
        <div className="dash-card" style={{ marginTop:12 }}>
          <div className="dash-card-title">📏 Medidas Corporais</div>
          {[["Peitoral","102 cm → 104 cm","+2cm"],["Cintura","86 cm → 82 cm","-4cm"],["Quadril","100 cm → 98 cm","-2cm"],["Braço D","36 cm → 38 cm","+2cm"],["Coxa D","58 cm → 57 cm","-1cm"]].map(([m,v,d],i) => (

              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
